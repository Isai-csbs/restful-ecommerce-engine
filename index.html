<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", fetchProducts);

        // Sample static data fallback for GitHub Pages demo preview
        const mockProducts = [
            { id: 1, title: "Premium Wireless Headphones", price: 149.99, stock_quantity: 50 },
            { id: 2, title: "Mechanical Gaming Keyboard", price: 89.95, stock_quantity: 35 },
            { id: 3, title: "Ergonomic Wireless Mouse", price: 45.00, stock_quantity: 100 }
        ];

        function displayProducts(products) {
            const grid = document.getElementById("product-grid");
            grid.innerHTML = "";
            products.forEach(product => {
                grid.innerHTML += `
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${product.title}</h5>
                                <p class="text-muted small">In stock: ${product.stock_quantity} units</p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="fw-bold text-success">$${parseFloat(product.price).toFixed(2)}</span>
                                    <button class="btn btn-sm btn-outline-secondary">Configure</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function fetchProducts() {
            try {
                const response = await fetch('api/products.php');
                if (!response.ok) throw new Error("PHP Backend Server not present");
                const result = await response.json();

                if(result.status === "success") {
                    displayProducts(result.data);
                } else {
                    displayProducts(mockProducts);
                }
            } catch (error) {
                console.warn("Falling back to static presentation data (GitHub Pages environment detected).");
                displayProducts(mockProducts);
            }
        }

        // Handle form submissions for demo presentation 
        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const newProduct = {
                id: mockProducts.length + 1,
                title: document.getElementById("formTitle").value,
                price: parseFloat(document.getElementById("formPrice").value),
                stock_quantity: parseInt(document.getElementById("formStock").value)
            };

            // Try to post to PHP server
            try {
                const response = await fetch('api/products.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });
                const result = await response.json();
                if(result.status === "success") {
                    bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
                    document.getElementById("productForm").reset();
                    fetchProducts();
                    return;
                }
            } catch (error) {
                console.warn("API offline. Appending item to local screen array for demonstration.");
            }

            // GitHub Pages fallback mock logic:
            mockProducts.unshift(newProduct);
            displayProducts(mockProducts);
            bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
            document.getElementById("productForm").reset();
        });
    </script>
